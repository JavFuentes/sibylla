# =============================================================================
# Sibylla — Registro de fuentes (source registry) · v1
# =============================================================================
# Principio rector: las fuentes se eligen y se PONDERAN por confiabilidad (tier),
# no por idioma. La ingesta es multilingüe; el resumen final se entrega al
# usuario en SU idioma. Ver config/README.md para el esquema y el plan de
# presupuesto de X / señal social.
#
# Estado de verificación: lo marcado `verified_2026-06-20` se probó EN VIVO el
# 2026-06-20 y funcionó. Lo marcado `known` es una fuente estándar y conocida
# cuyo feed exacto aún hay que confirmar al construir el ingestor.
# =============================================================================

meta:
  version: 1
  updated: 2026-06-20
  default_user_language: es        # idioma de salida del resumen
  selection_principle: >
    Seleccionar y rankear por confiabilidad (tier), no por idioma.
    Ingesta multilingüe -> resumen localizado al idioma del usuario.

  # --- Diccionarios de referencia (los usan los campos de cada fuente) -------
  tiers:
    1: "Primaria / autoridad: revistas peer-review, preprints, instituciones oficiales, agencias de cable."
    2: "Periodismo de calidad de ciencia/tecnología con estándares editoriales."
    3: "Agregadores y discusión: señal de DESCUBRIMIENTO; siempre corroborar y enlazar a una fuente Tier 1/2."

  access:
    open: "Accesible directamente vía RSS/API público."
    needs_key: "Requiere API key gratuita."
    blocked_for_claude_fetcher: "Bloquea el fetcher de Claude, PERO tiene feed/API público que un ingestor propio debería poder leer."
    paywalled: "Texto completo tras pago; usamos solo título + resumen + enlace a la fuente."
    paid_api: "API de pago / por uso (presupuestar)."
    out: "Sin vía pública viable; solo alcanzable indirectamente vía agregador (Google News/GDELT)."

  status:
    verified_2026-06-20: "Probado en vivo el 2026-06-20 y funcionó."
    verified_2026-06-22: "Probado en vivo el 2026-06-22 (feeds de la sección Nacional)."
    verified_2026-06-28: "Probado en vivo el 2026-06-28 (feeds de agencias espaciales, sección Astronomía)."
    known: "Fuente conocida/estándar; confirmar feed exacto al construir el ingestor."

  topics: [nacional, general_science, general_tech, ai, computing, space, astronomia,
           physics, biotech, medicine, climate, energy, neuroscience]

# =============================================================================
# TIER 1 — APIs científicas y preprints (la columna vertebral de "avances")
# =============================================================================
sources:

  - id: arxiv_api
    name: "arXiv API"
    publisher: "Cornell University"
    tier: 1
    type: api
    endpoint: "http://export.arxiv.org/api/query"
    example: "http://export.arxiv.org/api/query?search_query=cat:cs.AI&sortBy=submittedDate&sortOrder=descending&max_results=20"
    topics: [ai, computing, physics, space, general_science]
    lang: en
    license: "metadata abierta; PDFs según licencia del autor"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: "Preprints de física, CS/IA, matemáticas, bio cuantitativa. Filtrar por categoría (cs.AI, q-bio, astro-ph...)."

  - id: pubmed_eutils
    name: "PubMed (NCBI E-utilities)"
    publisher: "US National Library of Medicine"
    tier: 1
    type: api
    endpoint: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"
    example: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=cancer+immunotherapy&sort=date&retmode=json"
    topics: [medicine, biotech, neuroscience]
    lang: en
    license: "metadatos/abstracts públicos; full text según editor"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: "Recomendado: registrar una API key gratuita de NCBI para subir el rate limit (3->10 req/s). esummary/efetch para detalles."

  - id: europepmc
    name: "Europe PMC"
    publisher: "EMBL-EBI"
    tier: 1
    type: api
    endpoint: "https://www.ebi.ac.uk/europepmc/webservices/rest/search"
    example: "https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=crispr&format=json&sort=P_PDATE_D%20desc"
    topics: [medicine, biotech]
    lang: en
    license: "metadatos abiertos; subconjunto open access con texto completo"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: "Complementa/duplica PubMed con texto completo OA y sin key."

  - id: biorxiv_medrxiv
    name: "bioRxiv / medRxiv API"
    publisher: "Cold Spring Harbor Laboratory"
    tier: 1
    type: api
    endpoint: "https://api.biorxiv.org/details/biorxiv/"
    topics: [biotech, medicine, neuroscience]
    lang: en
    license: "preprints, mayormente CC-BY / CC-BY-ND"
    access: open
    cost: free
    status: known
    notes: "Preprints biomédicos. medRxiv = clínico. Útil para detectar avances antes de la revisión por pares (marcar como 'preprint, no revisado')."

  - id: crossref
    name: "Crossref REST API"
    publisher: "Crossref"
    tier: 1
    type: api
    endpoint: "https://api.crossref.org/works"
    topics: [general_science, medicine, physics]
    lang: en
    license: "metadatos abiertos"
    access: open
    cost: free
    status: known
    notes: "Metadatos de DOIs de casi todo lo publicado. Usar el 'polite pool' enviando un email en el User-Agent. Bueno para resolver/enriquecer una referencia."

  - id: semantic_scholar
    name: "Semantic Scholar Graph API"
    publisher: "Allen Institute for AI"
    tier: 1
    type: api
    endpoint: "https://api.semanticscholar.org/graph/v1/paper/search"
    topics: [ai, computing, general_science]
    lang: en
    license: "metadatos abiertos"
    access: needs_key
    cost: free
    status: known
    notes: "Key gratuita recomendada para rate limit. Bueno para influencia/citaciones y descubrir papers relacionados."

