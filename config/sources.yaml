    notes: "BBC en español; confirmar URL exacta del feed de ciencia/tecnología."

# =============================================================================
# TIER 3 — Agregadores (descubrimiento amplio y multilingüe)
# =============================================================================

  - id: google_news_rss
    name: "Google News (búsqueda por tema)"
    publisher: "Google"
    tier: 3
    type: rss_template
    url_template: "https://news.google.com/rss/search?q={QUERY}&hl={LANG}&gl={COUNTRY}&ceid={COUNTRY}:{LANG}"
    example: "https://news.google.com/rss/search?q=gene+therapy&hl=en-US&gl=US&ceid=US:en"
    topics: [general_science, general_tech, medicine, ai, space, climate]
    lang: multi
    license: "solo titulares + enlace a la fuente original"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: >
      Pieza clave de DESCUBRIMIENTO. Una consulta por tema/idioma. Devuelve titular + fuente + enlace
      (incluye Reuters/AP indirectamente). Usar operadores: comillas, when:1d, site:, OR. Los enlaces
      pasan por redirección de Google -> resolver a la URL final al guardar.

  - id: gdelt_doc
    name: "GDELT 2.0 Doc API"
    publisher: "The GDELT Project"
    tier: 3
    type: api
    endpoint: "https://api.gdeltproject.org/api/v2/doc/doc"
    example: "https://api.gdeltproject.org/api/v2/doc/doc?query=%22gene%20therapy%22&mode=artlist&format=json&sort=datedesc"
    topics: [general_science, general_tech, medicine, climate]
    lang: multi
    license: "metadatos abiertos"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: "Monitor global multilingüe de noticias (probado: devolvió artículos en 4 idiomas). Bueno para volumen/tono y cobertura por país."

# =============================================================================
# TIER 3 — Señal social / discusión (presupuestar X; el resto es gratis)
# =============================================================================

  - id: hacker_news
    name: "Hacker News (Algolia Search API)"
    publisher: "Y Combinator / Algolia"
    tier: 3
    type: api
    endpoint: "https://hn.algolia.com/api/v1/search_by_date"
    example: "https://hn.algolia.com/api/v1/search_by_date?tags=story&query=medicine&numericFilters=points%3E20"
    topics: [ai, computing, general_tech, general_science]
    lang: en
    license: "metadatos abiertos"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: "Mejor alternativa gratis a X para tech/IA/ciencia dura. Sin auth. Filtrar por puntos/comentarios para quedarse con lo relevante."

  - id: mastodon
    name: "Mastodon (Fediverso)"
    publisher: "Mastodon gGmbH (descentralizado)"
    tier: 3
    type: api
    endpoint: "https://{instance}/api/v1/timelines/tag/{hashtag}"
    suggested_instances: [fediscience.org, mastodon.social, mas.to, scholar.social]
    suggested_tags: [science, medicine, AI, astronomy, physics, climate]
    topics: [general_science, medicine, ai, space, physics]
    lang: multi
    license: "abierto (ActivityPub)"
    access: open
    cost: free
    status: known
    notes: "API gratuita por instancia. Muchos científicos migraron aquí (fediscience.org, scholar.social). Sin coste; ideal para sustituir buena parte de X."

  - id: bluesky
    name: "Bluesky (AT Protocol)"
    publisher: "Bluesky"
    tier: 3
    type: api
    endpoint: "https://public.api.bsky.app/xrpc/app.bsky.feed.searchPosts"
    topics: [general_science, general_tech, ai]
    lang: multi
    license: "abierto"
    access: needs_key
    cost: free
    status: known
    notes: "Gratis. La búsqueda de posts requiere auth (app password). Comunidad científica creciente. Alternativa abierta a X sin coste."

  - id: x_twitter
    name: "X (Twitter) API v2"
    publisher: "X Corp"
    tier: 3
    category: social
    type: paid_api
    endpoint: "https://api.twitter.com/2/tweets/search/recent"
    topics: [general_science, general_tech, ai, medicine]
    lang: multi
    license: "comercial"
    access: paid_api
    cost: "pay-per-use (~$0.005/lectura de post; tope 2M/mes). Publicar: $0.015, o $0.20 si lleva enlace"
    budget_usd_loaded: 5.00
    monthly_read_budget: 300        # ~$1.50/mes -> ver plan en README
    social_freshness_hours: 48      # solo posts de las últimas 48 h ('buzz' actual)
    # Consulta híbrida para "Voces de la red" (NO enriquece los temas):
    #   1) base curada: posts de estas cuentas de alta señal (IA + medicina).
    #   2) relleno: si las cuentas curadas no llenan las 2 tarjetas, se completa
    #      con búsqueda abierta por estas palabras clave. Todo en UNA sola
    #      consulta/día (~10 lecturas). Edita libremente la lista y las keywords.
    curated_accounts:               # IA
      - OpenAI
      - GoogleDeepMind
      - AnthropicAI
      - ylecun
      - demishassabis
      - MITTechReview
      # Medicina
      - NEJM
      - TheLancet
      - NIH
      - WHO
      - EricTopol
      - statnews
    social_query: >-
      "artificial intelligence" OR "machine learning" OR "large language model"
      OR "clinical trial" OR "gene therapy" OR "drug approval" OR "medical breakthrough"
    status: known
    notes: >
      Tier gratuito eliminado (feb-2026); cuenta nueva = pay-per-use. USAR CON CUIDADO y de forma quirúrgica:
      solo para CONFIRMAR/enriquecer las top-N historias ya detectadas por fuentes gratis. Cap mensual duro en
      código. NO publicar posts con enlaces ($0.20 c/u). Ver "Plan de presupuesto" en config/README.md.

