# =============================================================================
# Voces de la red — Configuración de lentes y cuentas propias
# =============================================================================
social:
  shuffle: true
  lenses:
    - { name: trend,    weight: 1, trend: true }
    - { name: ia,       weight: 1, mastodon_tag: ai,       query: '"artificial intelligence" OR "machine learning"', x_topic: ai }
    - { name: medicina, weight: 1, mastodon_tag: medicine, query: '"clinical trial" OR "gene therapy"',             x_topic: medicine }
    - { name: chile,    weight: 1, mastodon_tag: chile,    query: 'Chile',                                          x_topic: nacional }
  house_accounts:
    - { network: bluesky,  handle: sibylla.cl }
    - { network: mastodon, handle: "@sibylla@mastodon.social" }
    - { network: x,        handle: SibyllaCl }   # DE PAGO: solo con --with-x
