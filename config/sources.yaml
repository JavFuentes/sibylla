# =============================================================================
# TIER 3 — Agregadores (descubrimiento amplio y multilingüe)
# =============================================================================

  - id: google_news_rss
    name: "Google News (búsqueda por tema)"
    publisher: "Google"
    tier: 3
    type: rss_template
    url_template: "https://news.google.com/rss/search?q={QUERY}&hl={LANG}&gl={COUNTRY}&ceid={COUNTRY}:{LANG}"
    example: "https://news.google.com/rss/search?q=gene+therapy&hl=en-US&gl=US&ceid=US:en"
    topics: [general_science, general_tech, medicine, ai, space, climate]
    lang: multi
    license: "solo titulares + enlace a la fuente original"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: >
      Pieza clave de DESCUBRIMIENTO. Una consulta por tema/idioma. Devuelve titular + fuente + enlace
      (incluye Reuters/AP indirectamente). Usar operadores: comillas, when:1d, site:, OR. Los enlaces
      pasan por redirección de Google -> resolver a la URL final al guardar.

  - id: gdelt_doc
    name: "GDELT 2.0 Doc API"
    publisher: "The GDELT Project"
    tier: 3
    type: api
    endpoint: "https://api.gdeltproject.org/api/v2/doc/doc"
    example: "https://api.gdeltproject.org/api/v2/doc/doc?query=%22gene%20therapy%22&mode=artlist&format=json&sort=datedesc"
    topics: [general_science, general_tech, medicine, climate]
    lang: multi
    license: "metadatos abiertos"
    access: open
    cost: free
    status: verified_2026-06-20
    notes: "Monitor global multilingüe de noticias (probado: devolvió artículos en 4 idiomas). Bueno para volumen/tono y cobertura por país."

