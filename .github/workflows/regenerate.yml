# Regenera la web estática de Sibylla y la sube al hosting por SSH (rsync).
#
# El LLM es de build-time: traduce las tarjetas a los 4 idiomas en CI y hornea
# el HTML. Las claves viven como *secrets* cifrados del repo, NUNCA en el código
# (este repo es público). Ver DEPLOY.md §4 para la lista de secrets.
name: Regenerar sitio Sibylla

on:
  schedule:
    - cron: "0 11 * * *"   # diario a las 11:00 UTC (ajusta a tu gusto)
  workflow_dispatch: {}     # permite disparo manual desde la pestaña Actions

# Evita corridas solapadas si una tarda más que el intervalo.
concurrency:
  group: regenerate
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Cache de traducciones y métricas entre corridas: solo se re-traduce
      # y se acumula el historial de runs. data/ está en .gitignore.
      - name: Restaurar cache (traducciones + métricas de runs)
        uses: actions/cache@v4
        with:
          path: |
            data/translations.json
            data/runs.json
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: Generar sitio (con traducción de tarjetas)
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SIBYLLA_SITE_URL: ${{ vars.SIBYLLA_SITE_URL || 'https://sibylla.cl' }}
          DASHBOARD_KEY: ${{ secrets.DASHBOARD_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python -m sibylla.cli --topics ai,medicine --with-x --html --translate auto

      - name: Subir web/ al host por SCP (SSH)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          HOST="${DEPLOY_HOST}"
          USER="${DEPLOY_USER}"
          PATH_REMOTO="${DEPLOY_PATH}"
          RETRIES=5            # nº de intentos por operación (súbelo si fail2ban es agresivo)

          echo "→ Verificando que web/ existe y tiene contenido..."
          ls -la web/

          echo "→ Preparando clave SSH..."
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"

          # Reintenta un comando con backoff exponencial (10s,20s,40s,80s; tope 90s).
          # Absorbe timeouts/baneos transitorios del host (fail2ban) y las IP
          # rotatorias de los runners. En el camino feliz el comando entra al
          # primer intento y no añade ninguna espera.
          reintentar() {
            local desc="$1"; shift
            local demora=10 n=1
            while true; do
              if "$@"; then return 0; fi
              if [ "$n" -ge "$RETRIES" ]; then
                echo "✗ $desc: falló tras $RETRIES intentos." >&2
                return 1
              fi
              echo "  ⟳ $desc: intento $n/$RETRIES falló; reintento en ${demora}s..." >&2
              sleep "$demora"
              n=$((n + 1)); demora=$((demora * 2))
              if [ "$demora" -gt 90 ]; then demora=90; fi
            done
          }

          probar_ssh() { ssh $SSH_OPTS -p "$PORT" -i ~/.ssh/id_deploy "$USER@$HOST" "echo 'SSH OK'"; }
          subir_scp()  { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy -r web/*.html web/robots.txt web/sitemap.xml "$USER@$HOST:$PATH_REMOTO/"; }

          echo "→ Probando conectividad SSH (con reintentos)..."
          reintentar "test de conectividad SSH" probar_ssh || {
            echo "ERROR: No se pudo conectar por SSH a $USER@$HOST:$PORT tras $RETRIES intentos."
            exit 1
          }

          echo "→ Subiendo web/ con scp (con reintentos)..."
          reintentar "subida SCP de web/" subir_scp || {
            echo "ERROR: No se pudo subir web/ a $PATH_REMOTO tras $RETRIES intentos."
            exit 1
          }

          echo "✅ Deploy completado a $PATH_REMOTO"
