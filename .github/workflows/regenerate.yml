# Regenera la web estática de Sibylla y la sube al hosting por SSH (scp).
#
# El LLM es de build-time: traduce las tarjetas a los 4 idiomas en CI y hornea
# el HTML. Las claves viven como *secrets* cifrados del repo, NUNCA en el código
# (este repo es público). Ver DEPLOY.md §4 para la lista de secrets.
#
# El historial de métricas (data/runs.json) se persiste en el HOST, no en el
# cache de Actions: antes de generar se descarga el runs.json del servidor y
# después se vuelve a subir ya con la corrida nueva añadida. Así el dashboard
# acumula el historial de forma duradera. (El cache de Actions se evicta a los
# 7 días sin accesos y se reinicia si cambia la key — por eso NO lo usamos para
# el historial.) El cache solo guarda las traducciones, que sí son regenerables.
name: Regenerar sitio Sibylla

on:
  schedule:
    # Primer intento 14:08 UTC (10:08 Chile en invierno UTC-4; 11:08 en verano
    # UTC-3) y respaldo 14:38 UTC. El respaldo solo despliega si el intento
    # anterior del día no terminó en éxito (ver job chequeo-previo). Minuto
    # :08/:38 (no en punto) a propósito: GitHub retrasa o descarta los crons
    # del minuto :00, el más saturado de Actions (con ":00" las corridas
    # reales arrancaban 30-70 min tarde). Aun así el arranque puede demorar
    # unos minutos: el cron de Actions es best-effort, no puntual.
    - cron: "8 14 * * *"
    - cron: "38 14 * * *"
  workflow_dispatch: {}     # permite disparo manual desde la pestaña Actions

# Evita corridas solapadas: garantiza que el read-modify-write de runs.json en
# el host nunca se pise entre dos corridas.
concurrency:
  group: regenerate
  cancel-in-progress: false

# Endurece el GITHUB_TOKEN: solo lectura al repo. El despliegue va por SSH
# (DEPLOY_KEY), nunca vía token de git. actions/cache se autentica con un
# runtime token aparte que inyecta el runner, así que NO hace falta
# actions: write para salvar caché. actions: read es para que chequeo-previo
# consulte el historial de corridas del día.
permissions:
  contents: read
  actions: read

jobs:
  # Decide si esta corrida debe desplegar. Un día normal el cron de las 14:08
  # despliega y el de las 14:38 (respaldo) se salta al ver el éxito previo —
  # así no se gasta LLM/X dos veces al día. El respaldo solo actúa si el
  # primer intento falló o si GitHub descartó su cron. Los disparos manuales
  # (workflow_dispatch) despliegan siempre. La concurrencia (grupo regenerate)
  # garantiza el orden: si el primer intento sigue corriendo cuando dispara el
  # respaldo, este espera y luego ve el resultado real.
  chequeo-previo:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      desplegar: ${{ steps.decidir.outputs.desplegar }}
    steps:
      - name: ¿Ya hubo un deploy programado exitoso hoy?
        id: decidir
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "→ Disparo manual (workflow_dispatch): se despliega siempre."
            echo "desplegar=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hoy=$(date -u +%F)
          # La corrida actual no cuenta: aún no tiene conclusion=success.
          exitos=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/regenerate.yml/runs?event=schedule&status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$hoy\"))] | length")
          if [ "$exitos" -gt 0 ]; then
            echo "→ Ya hay $exitos deploy(s) programado(s) exitoso(s) hoy ($hoy UTC): este disparo es el respaldo y no hace falta."
            echo "desplegar=false" >> "$GITHUB_OUTPUT"
          else
            echo "→ Aún no hay deploy programado exitoso hoy ($hoy UTC): se despliega."
            echo "desplegar=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: chequeo-previo
    if: needs.chequeo-previo.outputs.desplegar == 'true'
    runs-on: ubuntu-latest
    # Corrida típica: 5-7 min (máx. observado ~12). El tope corta un job
    # colgado (SSH/LLM) a tiempo para que el cron de respaldo aún sirva.
    timeout-minutes: 30
    env:
      # Ruta donde se guarda el historial de métricas en el host. Relativa al
      # home del usuario SSH (= fuera de la raíz pública, no se sirve por web).
      # Overridable con la variable de repo DEPLOY_DATA_PATH. Usa una ruta
      # relativa o absoluta, NO con '~' (no se expande entre comillas).
      REMOTE_DATA: ${{ vars.DEPLOY_DATA_PATH || '.sibylla' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Cache regenerable (ahorra costo/robustez, no es historial):
      #   - translations.json: traducciones de tarjetas (ahorra LLM).
      #   - resumenes.json + articles.json: resúmenes por tarjeta y cuerpos de
      #     artículo ya extraídos. Sin esto, CADA corrida re-extraía con
      #     trafilatura (frágil) y re-resumía con el LLM todas las tarjetas
      #     visibles: el mayor gasto LLM del build, repetido en cada deploy.
      #   - youtube_cache.json: última corrida buena de cada feed de YouTube.
      #     El endpoint feeds/videos.xml es flaky desde las IPs de Actions; con el
      #     caché, un canal que se bajó bien una vez sigue apareciendo aunque su
      #     feed falle en el build siguiente. Se evicta a los 7 días sin uso, pero
      #     el cron diario lo mantiene caliente.
      # OJO: regenerate-apod.yml comparte el prefijo de key y debe cachear ESTA
      # MISMA lista de archivos; si guardara solo translations.json, su cache
      # (el más reciente de la mañana) dejaría a este build sin los demás.
      # El historial (runs.json) NO se cachea aquí; vive en el host.
      - name: Restaurar cache regenerable (traducciones + resúmenes + YouTube)
        uses: actions/cache@v4
        with:
          path: |
            data/translations.json
            data/youtube_cache.json
            data/resumenes.json
            data/articles.json
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: Preparar clave SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      # Descarga el historial acumulado del host ANTES de generar, para que la
      # corrida nueva se añada encima en vez de empezar de cero.
      - name: Descargar historial de métricas del host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/ssh_retry.sh
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p data

          probar_ssh()       { ssh $SSH_OPTS -p "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" "echo SSH OK"; }
          descargar()        { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/runs.json" data/runs.json; }
          descargar_xusage() { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/x_usage.json" data/x_usage.json; }
          descargar_xrecent() { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/x_recent.json" data/x_recent.json; }
          descargar_xhouse()  { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/x_house.json" data/x_house.json; }

          # Si el host es inalcanzable ABORTAMOS: generar con historial vacío y
          # luego subirlo machacaría el runs.json bueno que vive en el servidor.
          echo "→ Probando conectividad SSH (con reintentos)..."
          reintentar "test SSH (pre-descarga)" probar_ssh || {
            echo "ERROR: host inalcanzable; abortando para no perder el historial del servidor."
            exit 1
          }

          # ¿Existe ya el historial remoto?  0 = sí · 1 = no · otro = error SSH.
          set +e
          ssh $SSH_OPTS -p "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" "test -f '$REMOTE_DATA/runs.json'"
          rc=$?
          set -e
          case "$rc" in
            0)
              echo "→ Historial remoto encontrado; descargando..."
              reintentar "descarga de runs.json" descargar || {
                echo "ERROR: no se pudo descargar runs.json pese a existir; abortando."
                exit 1
              }
              echo "✓ runs.json descargado ($(wc -c < data/runs.json) bytes)."
              ;;
            1)
              echo "ⓘ Aún no hay historial en el host (primera corrida); uso el local como semilla."
              ;;
            *)
              echo "ERROR: fallo SSH (rc=$rc) al comprobar runs.json; abortando para no machacar el historial."
              exit 1
              ;;
          esac

          # Contador de lecturas de X (x_usage.json): best-effort. Es solo el tope
          # mensual de gasto, no historial; si no existe o falla, se sigue (el mes
          # arranca en 0). Persistirlo hace que el cap mensual SÍ frene en CI.
          if descargar_xusage 2>/dev/null; then
            echo "✓ x_usage.json descargado ($(wc -c < data/x_usage.json) bytes)."
          else
            echo "ⓘ Sin x_usage.json en el host (o inalcanzable); el contador del mes arranca en 0."
          fi

          # Caché diaria de X (orgánico + house): best-effort. Sin esto, un
          # workflow_dispatch manual el mismo día del cron volvería a gastar
          # lecturas (cada corrida arranca en una VM limpia). Si no existe o
          # falla, se sigue: esta corrida simplemente vuelve a leer de la API.
          if descargar_xrecent 2>/dev/null; then
            echo "✓ x_recent.json descargado ($(wc -c < data/x_recent.json) bytes)."
          else
            echo "ⓘ Sin x_recent.json en el host (o inalcanzable); se leerá de la API si toca."
          fi
          if descargar_xhouse 2>/dev/null; then
            echo "✓ x_house.json descargado ($(wc -c < data/x_house.json) bytes)."
          else
            echo "ⓘ Sin x_house.json en el host (o inalcanzable); se leerá de la API si toca."
          fi

      - name: Generar sitio (con traducción de tarjetas)
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SIBYLLA_SITE_URL: ${{ vars.SIBYLLA_SITE_URL || 'https://sibylla.cl' }}
          SIBYLLA_GOOGLE_VERIFICATION: ${{ vars.SIBYLLA_GOOGLE_VERIFICATION }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python -m sibylla.cli --topics nacional,ai,medicine,astronomia,divulgacion --with-x --html --translate auto

      # Aviso NO bloqueante: si YouTube throttlea todos los feeds en un build de
      # caché fría, la sección puede quedar vacía. NO debe abortar el deploy (el
      # resto del sitio es válido y el principio del repo es "fallo aislado, sin
      # romper la corrida"). El caché de feeds la repuebla en la siguiente corrida.
      - name: Verificar sección Divulgación (aviso)
        run: |
          set -uo pipefail
          if ! grep -q 'id="divulgacion"' web/index.html; then
            echo "::warning::La sección Divulgación quedó vacía este build (¿YouTube throttleó todos los feeds con caché fría?). El deploy sigue; se repuebla desde el caché en la próxima corrida. Revisa el conteo 'Divulgación: ...' en los logs."
          fi

      - name: Subir web/ y persistir historial en el host (scp)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          source .github/scripts/ssh_retry.sh
          PORT="${DEPLOY_PORT:-22}"

          echo "→ Verificando que web/ existe y tiene contenido..."
          ls -la web/

          # Páginas del sitio. El dashboard de métricas NO se genera en CI
          # (es una herramienta local), así que web/ solo trae páginas públicas.
          PUBLICOS=(web/*.html)
          echo "→ Páginas públicas a subir: ${PUBLICOS[*]}"

          JSONS=(web/*.json)
          echo "→ JSON públicos a subir: ${JSONS[*]}"

          # Assets estáticos (favicons, iconos, manifest): se derivan de static/
          # para que añadir un archivo allí lo despliegue sin tocar este workflow.
          ASSETS=()
          if [ -d static ]; then
            for f in static/*; do
              [ -f "$f" ] && [ -f "web/$(basename "$f")" ] && ASSETS+=("web/$(basename "$f")")
            done
          fi
          echo "→ Assets estáticos a subir: ${ASSETS[*]:-(ninguno)}"

          # Archivo histórico del APOD (apod-i18n/<fecha>.json): `scp -r` sobre
          # un directorio remoto ya existente MERGEA (no purga lo que ya hay),
          # así se acumula un archivo por día sin el patrón descargar/subir que
          # usa el historial de métricas (runs.json). Normalmente ya lo dejó
          # escrito el cron temprano de regenerate-apod.yml; esto lo re-sube
          # (idempotente) por si ese cron falló.
          APOD_ARCHIVE=()
          [ -d web/apod-i18n ] && APOD_ARCHIVE+=(web/apod-i18n)
          echo "→ Archivo histórico de APOD a subir: ${APOD_ARCHIVE[*]:-(ninguno)}"

          probar_ssh()     { ssh $SSH_OPTS -p "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" "echo 'SSH OK'"; }
          subir_web()      { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy -r "${PUBLICOS[@]}" "${JSONS[@]}" "${ASSETS[@]}" "${APOD_ARCHIVE[@]}" web/robots.txt web/sitemap.xml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"; }
          crear_data_dir() { ssh $SSH_OPTS -p "$PORT" -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_DATA'"; }
          subir_runs()     { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy data/runs.json "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/runs.json"; }
          subir_xusage()   { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy data/x_usage.json "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/x_usage.json"; }
          subir_xrecent()  { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy data/x_recent.json "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/x_recent.json"; }
          subir_xhouse()   { scp $SSH_OPTS -P "$PORT" -i ~/.ssh/id_deploy data/x_house.json "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DATA/x_house.json"; }

          echo "→ Probando conectividad SSH (con reintentos)..."
          reintentar "test de conectividad SSH" probar_ssh || {
            echo "ERROR: No se pudo conectar por SSH a $DEPLOY_USER@$DEPLOY_HOST:$PORT tras varios intentos."
            exit 1
          }

          echo "→ Subiendo web/ con scp (con reintentos)..."
          reintentar "subida SCP de web/" subir_web || {
            echo "ERROR: No se pudo subir web/ a $DEPLOY_PATH tras varios intentos."
            exit 1
          }

          # Persistir el historial ya con la corrida nueva añadida.
          if [ -f data/runs.json ]; then
            echo "→ Persistiendo runs.json en el host ($REMOTE_DATA)..."
            reintentar "crear dir de datos remoto" crear_data_dir || {
              echo "ERROR: no se pudo crear $REMOTE_DATA en el host."
              exit 1
            }
            if reintentar "subida de runs.json" subir_runs; then
              echo "✓ Historial persistido en $REMOTE_DATA/runs.json"
            else
              echo "⚠ No se pudo subir runs.json; la web ya fue desplegada, pero el historial no quedó persistido."
            fi
          else
            echo "ⓘ No hay data/runs.json que persistir (¿generación sin métricas?)."
          fi

          # Persistir el contador de gasto de X (best-effort, no aborta el deploy).
          if [ -f data/x_usage.json ]; then
            echo "→ Persistiendo x_usage.json en el host ($REMOTE_DATA)..."
            reintentar "subida de x_usage.json" subir_xusage \
              && echo "✓ Contador de X persistido en $REMOTE_DATA/x_usage.json" \
              || echo "⚠ No se pudo persistir x_usage.json; el cap del mes podría reiniciarse."
          fi

          # Persistir la caché diaria de X (best-effort, no aborta el deploy).
          # Sin esto, un workflow_dispatch manual el mismo día del cron
          # volvería a gastar lecturas en la próxima corrida.
          if [ -f data/x_recent.json ]; then
            echo "→ Persistiendo x_recent.json en el host ($REMOTE_DATA)..."
            reintentar "subida de x_recent.json" subir_xrecent \
              && echo "✓ Caché orgánica de X persistida en $REMOTE_DATA/x_recent.json" \
              || echo "⚠ No se pudo persistir x_recent.json; la próxima corrida del día re-leería."
          fi
          if [ -f data/x_house.json ]; then
            echo "→ Persistiendo x_house.json en el host ($REMOTE_DATA)..."
            reintentar "subida de x_house.json" subir_xhouse \
              && echo "✓ Caché house de X persistida en $REMOTE_DATA/x_house.json" \
              || echo "⚠ No se pudo persistir x_house.json; la próxima corrida del día re-leería."
          fi

          echo "✅ Deploy completado a $DEPLOY_PATH"
