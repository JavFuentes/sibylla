<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sibylla · Cómo funciona</title>
<style>
  :root{
    --noche:#080b14;
    --panel:#0f1526;
    --line:rgba(169,242,238,.13);
    --text:#e9e2cf;
    --muted:#8e8979;
    --gold:#d9b85f;
    --gold-soft:#f2dd93;
    --cyan:#5ee6e0;
    --cyan-soft:#a8f2ee;
    --violet:#b05cff;
    --green:#42d989;
    --blue:#68a7ff;
    --rose:#ff668f;
    --grey:#92a0ad;
  }
  *{ box-sizing:border-box; }
  html,body{ width:100%; height:100%; margin:0; overflow:hidden; pointer-events:none; }
  body{
    color:var(--text);
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(760px 520px at 62% 48%, rgba(94,230,224,.12), transparent 58%),
      radial-gradient(520px 420px at 76% 26%, rgba(176,92,255,.12), transparent 56%),
      linear-gradient(180deg, rgba(15,21,38,.97), rgba(8,11,20,.99));
  }
  .grain{
    position:fixed; inset:0; opacity:.16; mix-blend-mode:screen;
    background-image:
      radial-gradient(1px 1px at 16px 24px, rgba(255,255,255,.34), transparent),
      radial-gradient(1px 1px at 140px 92px, rgba(94,230,224,.32), transparent),
      radial-gradient(1px 1px at 260px 44px, rgba(217,184,95,.32), transparent);
    background-size:380px 260px;
  }
  main{ position:fixed; inset:0; overflow:hidden; border-radius:16px; }
  .legend{
    position:absolute; left:16px; bottom:14px; z-index:3;
    display:flex; flex-wrap:wrap; gap:7px; max-width:calc(100% - 32px);
  }
  .chip{
    display:inline-flex; align-items:center; gap:5px; padding:4px 8px;
    border-radius:999px; border:1px solid rgba(217,184,95,.18);
    background:rgba(8,11,20,.46); color:#c8c0a9;
    font-size:9px; letter-spacing:.12em; text-transform:uppercase;
  }
  .chip i{ width:6px; height:6px; border-radius:50%; background:var(--c); box-shadow:0 0 12px var(--c); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; }
  svg.labels{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .label text{ font-size:11px; fill:#f7f0d8; paint-order:stroke; stroke:#070a13; stroke-width:4px; stroke-linejoin:round; letter-spacing:.01em; }
  .label.major text{ font-size:13px; font-weight:700; fill:#fff7d8; }
  .label .tag{ font-size:8px; fill:#8e8979; text-transform:uppercase; letter-spacing:.11em; }
  @media (max-width:560px){ .label text{ font-size:10px; } .label.major text{ font-size:12px; } .legend{ display:none; } }
  @media (prefers-reduced-motion:reduce){ *,*:before,*:after{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main>
  <canvas id="graph" aria-label="Grafo visual de cómo funciona Sibylla"></canvas>
  <svg class="labels" id="labels" aria-hidden="true"></svg>
  <div class="legend" aria-hidden="true">
    <span class="chip" style="--c:#5ee6e0"><i></i>Fuentes</span>
    <span class="chip" style="--c:#42d989"><i></i>Filtrado</span>
    <span class="chip" style="--c:#b05cff"><i></i>IA</span>
    <span class="chip" style="--c:#68a7ff"><i></i>Web</span>
    <span class="chip" style="--c:#ff668f"><i></i>Chile</span>
    <span class="chip" style="--c:#92a0ad"><i></i>Tests</span>
  </div>
</main>
<script>
const palette = {
  core:'#f2dd93', fuentes:'#5ee6e0', filtrado:'#42d989', ia:'#b05cff', web:'#68a7ff', chile:'#ff668f', tests:'#92a0ad', config:'#d9b85f'
};
const nodes = [
  {id:'Sibylla', label:'Sibylla', group:'core', size:24, fixed:true, x:.50, y:.50, tag:'proyecto'},
  {id:'sources.yaml', label:'Fuentes', group:'fuentes', size:17, x:.18, y:.54, tag:'sources.yaml'},
  {id:'fetchers.py', label:'Lectura', group:'fuentes', size:20, x:.24, y:.30, tag:'fetchers.py'},
  {id:'models.py', label:'Tarjeta normalizada', group:'core', size:15, x:.42, y:.31, tag:'models.py'},
  {id:'pipeline.py', label:'Selección', group:'filtrado', size:22, x:.45, y:.60, tag:'pipeline.py'},
  {id:'cluster.py', label:'Una historia', group:'filtrado', size:14, x:.31, y:.73, tag:'cluster.py'},
  {id:'nacional.py', label:'Chile', group:'chile', size:15, x:.57, y:.76, tag:'nacional.py'},
  {id:'llm.py', label:'Proveedor IA', group:'ia', size:18, x:.73, y:.34, tag:'llm.py'},
  {id:'translate.py', label:'Traducción', group:'ia', size:14, x:.82, y:.49, tag:'translate.py'},
  {id:'resumen.py', label:'Resumen', group:'ia', size:14, x:.76, y:.64, tag:'resumen.py'},
  {id:'web.py', label:'Portada', group:'web', size:22, x:.60, y:.25, tag:'web.py'},
  {id:'index.html.j2', label:'Plantilla', group:'web', size:14, x:.78, y:.20, tag:'index.html.j2'},
  {id:'publicaciones.py', label:'SIBYLLA', group:'web', size:13, x:.67, y:.80, tag:'publicaciones.py'},
  {id:'tests', label:'Tests', group:'tests', size:18, x:.83, y:.76, tag:'tests/'},
  {id:'locales', label:'Textos', group:'config', size:12, x:.59, y:.38, tag:'locales/'}
];
const edges = [
  ['sources.yaml','fetchers.py'], ['fetchers.py','models.py'], ['models.py','pipeline.py'], ['pipeline.py','cluster.py'],
  ['pipeline.py','nacional.py'], ['pipeline.py','web.py'], ['web.py','index.html.j2'], ['web.py','publicaciones.py'],
  ['pipeline.py','llm.py'], ['llm.py','translate.py'], ['llm.py','resumen.py'], ['translate.py','web.py'], ['resumen.py','web.py'],
  ['locales','web.py'], ['tests','models.py'], ['tests','pipeline.py'], ['tests','web.py'], ['Sibylla','pipeline.py'], ['Sibylla','web.py']
];
const nodeById = new Map(nodes.map(n => [n.id, n]));
const linkData = edges.map(([a,b]) => ({source:nodeById.get(a), target:nodeById.get(b)})).filter(e => e.source && e.target);
function phaseFor(id){ let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0; return (h%6283)/1000; }
for(const n of nodes){ n.vx=0; n.vy=0; n.phase=phaseFor(n.id); }
const canvas=document.getElementById('graph');
const ctx=canvas.getContext('2d');
const labels=document.getElementById('labels');
let w=0,h=0,dpr=1,t=0;
function resize(){
  const rect=canvas.getBoundingClientRect();
  dpr=Math.min(window.devicePixelRatio||1,2); w=rect.width; h=rect.height;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  canvas.style.width=w+'px'; canvas.style.height=h+'px'; ctx.setTransform(dpr,0,0,dpr,0,0);
  for(const n of nodes){ n.px=n.x*w; n.py=n.y*h; n.tx=n.x*w; n.ty=n.y*h; }
}
function physics(){
  for(const n of nodes){ const pull=n.fixed ? .075 : .018; n.vx+=(n.tx-n.px)*pull; n.vy+=(n.ty-n.py)*pull; }
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i], b=nodes[j]; let dx=b.px-a.px, dy=b.py-a.py; const dist2=dx*dx+dy*dy+.01;
    const min=a.size+b.size+20;
    if(dist2<min*min){ const dist=Math.sqrt(dist2), force=(min-dist)*.006; dx/=dist; dy/=dist; a.vx-=dx*force; a.vy-=dy*force; b.vx+=dx*force; b.vy+=dy*force; }
  }
  for(const e of linkData){
    const a=e.source,b=e.target; const dx=b.px-a.px,dy=b.py-a.py,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const target=108+(a.size+b.size)*1.2, force=(dist-target)*.0007;
    const fx=dx/dist*force, fy=dy/dist*force; if(!a.fixed){ a.vx+=fx; a.vy+=fy; } if(!b.fixed){ b.vx-=fx; b.vy-=fy; }
  }
  for(const n of nodes){ n.vx*=.84; n.vy*=.84; n.px+=n.vx; n.py+=n.vy; }
}
function hexToRgb(hex){ const n=parseInt(hex.slice(1),16); return `rgb(${(n>>16)&255},${(n>>8)&255},${n&255})`; }
function glowLine(a,b,color,alpha,width){
  const grad=ctx.createLinearGradient(a.px,a.py,b.px,b.py);
  grad.addColorStop(0,color.replace(')',`, ${alpha})`).replace('rgb','rgba'));
  grad.addColorStop(1,'rgba(255,255,255,.02)');
  ctx.strokeStyle=grad; ctx.lineWidth=width; ctx.beginPath(); ctx.moveTo(a.px,a.py);
  const mx=(a.px+b.px)/2,my=(a.py+b.py)/2; ctx.quadraticCurveTo(mx+(b.py-a.py)*.04,my-(b.px-a.px)*.04,b.px,b.py); ctx.stroke();
}
function renderLabels(){
  labels.innerHTML=nodes.map(n=>{
    const major=n.size>=18?' major':''; const dy=-n.size-9;
    const tag=n.tag?`<text class="tag" x="${n.px.toFixed(1)}" y="${(n.py+dy+12).toFixed(1)}" text-anchor="middle">${n.tag}</text>`:'';
    return `<g class="label${major}"><text x="${n.px.toFixed(1)}" y="${(n.py+dy).toFixed(1)}" text-anchor="middle">${n.label}</text>${tag}</g>`;
  }).join('');
}
function draw(){
  t+=.012; physics(); physics(); ctx.clearRect(0,0,w,h);
  const bg=ctx.createRadialGradient(w*.53,h*.50,40,w*.53,h*.50,Math.max(w,h)*.62);
  bg.addColorStop(0,'rgba(94,230,224,.09)'); bg.addColorStop(.36,'rgba(176,92,255,.04)'); bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h); ctx.globalCompositeOperation='lighter';
  for(const e of linkData){ const ca=hexToRgb(palette[e.source.group]||'#8fa'); const main=e.source.size>17||e.target.size>17; glowLine(e.source,e.target,ca,main ? .2 : .1,main ? 1.1 : .6); }
  for(const e of linkData.filter((_,i)=>i%3===0)){ const p=(Math.sin(t*1.2+e.source.phase)+1)/2; const x=e.source.px+(e.target.px-e.source.px)*p; const y=e.source.py+(e.target.py-e.source.py)*p; ctx.fillStyle='rgba(168,242,238,.48)'; ctx.beginPath(); ctx.arc(x,y,1.25,0,Math.PI*2); ctx.fill(); }
  for(const n of nodes){
    const color=palette[n.group]||'#fff'; const pulse=Math.sin(t*2+n.phase)*.65; const r=n.size+pulse;
    const halo=ctx.createRadialGradient(n.px,n.py,0,n.px,n.py,r*5.2); halo.addColorStop(0,color+'dd'); halo.addColorStop(.18,color+'55'); halo.addColorStop(1,color+'00');
    ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(n.px,n.py,r*5.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=color; ctx.beginPath(); ctx.arc(n.px,n.py,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.88)'; ctx.beginPath(); ctx.arc(n.px-r*.25,n.py-r*.32,Math.max(1.1,r*.25),0,Math.PI*2); ctx.fill();
  }
  ctx.globalCompositeOperation='source-over'; renderLabels(); requestAnimationFrame(draw);
}
window.addEventListener('resize',resize);
resize(); requestAnimationFrame(draw);
</script>
</body>
</html>
